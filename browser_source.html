<html>

<head>
	<script>
		// Apply scaling immediately before page renders
		const uiScaling = localStorage.getItem('uiScalingValue') || 100;
		document.documentElement.style.setProperty('--ui-scaling', uiScaling/100);
		// Add event listener for when DOM is fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            const opacity = localStorage.getItem('overlayOpacity') || 100;
            const elements = ["scoreBoardDiv", "gameInfo", "ballTracker"];
            elements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.style.opacity = opacity/100;
                }
            });
        });
	// </script><script src="./common/js/jquery.js"></script>
	<script src="./common/js/browser_source.js"></script>
	<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
	<link rel="stylesheet" href="./common/css/browser_source/required.css" />
	<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
</head>

<body>
	<!-- Race to & Game Info in center -->
	<div id="gameInfoWrapper">
		<div id="raceInfo" class="noShow fadeInElm"></div>
		<div class="noShow fadeInElm" id="gameInfo"></div>
		<div class="ticker-container fadeOutElm" id="ticker">
			<div class="ticker-content" id="tickerContent"></div>
		</div>
	</div>
	
	<div id="scoreBoardDiv" class="fadeInElm">
		<!-- Main scoreboard container -->
		<div id="scoreBoard">
			
			<!-- Player 1 section -->
			<div class="player-container left">
				<div class="ext-image-container">
					<div id="hpBPIcon" class="fadeInElm"></div>
					<div id="hpImageDiv" class="fadeOutElm">
						<img id="hpImage" src=""></img>
					</div>
				</div>		
				<div id="hpName" class="fadeInElm">
					<span>Home Player</span>
				</div>
				<div class="score-logo-container">
					<div id="hpScore" class="fadeInElm">99</div>
				</div>
		  	</div>
		  	<!-- Player 2 section -->
		  	<div class="player-container right">
				<div class="score-logo-container">
					<div id="apScore" class="fadeInElm">99</div>
				</div>
				<div id="apName" class="fadeInElm">
					<span>Away Player</span>
				</div>
				<div class="ext-image-container">
					<div id="apBPIcon" class="fadeInElm"></div>
					<div id="apImageDiv" class="fadeOutElm">
						<img id="apImage" src="">
					</div>
				</div>
		  	</div>
		</div>
	</div>
	<script src="./common/js/browser_source_post.js"></script>
</body>

</html>
